services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: projectours-api
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=projectours;Username=postgres;Password=${DB_PASSWORD:-postgres}
      - JwtSettings__Secret=${JWT_SECRET:-your-super-secret-key-with-at-least-32-characters!}
      - JwtSettings__Issuer=project-ours-api
      - JwtSettings__Audience=project-ours-app
      - JwtSettings__ExpirationHours=24
      - GoogleAuth__ClientId=${GOOGLE_CLIENT_ID}
      - Cors__AllowedOrigins__0=${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - projectours-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: projectours-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=projectours
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - projectours-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
    driver: local

networks:
  projectours-network:
    driver: bridge
